{% extends "base.html" %}
{% block title %}User QR Codes{% endblock %}

{% block content %}
<!-- Custom CSS for futuristic card styles and 3D animations -->
<style>
  /* Futuristic card styling */
  .qr-card {
    background: linear-gradient(145deg, rgba(0, 20, 40, 0.9), rgba(0, 40, 80, 0.8));
    border: 1px solid rgba(0, 255, 255, 0.3);
    box-shadow: 0 10px 30px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.1);
    border-radius: 15px;
    transform-style: preserve-3d;
    transition: all 0.3s ease;
    overflow: hidden;
    position: relative;
  }

  .qr-card:hover {
    transform: perspective(1000px) rotateX(10deg) rotateY(10deg) scale(1.05);
    box-shadow: 0 20px 40px rgba(0, 255, 255, 0.4);
  }

  .qr-card .card-body {
    padding: 20px;
    text-align: center;
  }

  .qr-data {
    color: #e0e0e0;
    font-size: 0.9rem;
    margin-bottom: 15px;
    text-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
  }

  .qr-image {
    max-width: 100%;
    height: auto;
    border-radius: 10px;
    animation: qr-pulse 4s infinite ease-in-out;
    box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
  }

  @keyframes qr-pulse {
    0%, 100% { transform: scale(1) rotateX(0deg); }
    50% { transform: scale(1.05) rotateX(5deg); }
  }

  /* Holographic overlay on cards */
  .holo-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.05) 50%, transparent 70%);
    pointer-events: none;
    opacity: 0.3;
    z-index: 1;
  }

  /* Scanning lines animation */
  .scan-lines {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(transparent 50%, rgba(0, 255, 255, 0.2) 50%);
    background-size: 100% 4px;
    animation: scan 3s linear infinite;
    pointer-events: none;
    z-index: 2;
  }

  @keyframes scan {
    0% { transform: translateY(-100%); }
    100% { transform: translateY(100%); }
  }

  /* Staggered 3D fade-in for cards */
  .qr-card-container {
    opacity: 0;
    transform: translateY(30px) rotateX(-15deg);
    animation: card-fade-in 0.8s ease-out forwards;
  }

  {% for qr in qrcodes %}
  .qr-card-container:nth-child({{ loop.index }}) { animation-delay: {{ loop.index * 0.2 }}s; }
  {% endfor %}

  @keyframes card-fade-in {
    to {
      opacity: 1;
      transform: translateY(0) rotateX(0deg);
    }
  }

  /* Neon back button */
  .neon-btn {
    background: linear-gradient(45deg, #00ffff, #0080ff);
    border: none;
    color: #000;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
  }

  .neon-btn:hover {
    transform: translateY(-2px) scale(1.05) rotateX(10deg);
    box-shadow: 0 10px 25px rgba(0, 255, 255, 0.5);
  }

  /* Empty state styling */
  .empty-state {
    text-align: center;
    color: #e0e0e0;
    font-size: 1.2rem;
    text-shadow: 0 0 10px rgba(0, 255, 255, 0.5);
    animation: fade-in-empty 1s ease-out;
  }

  @keyframes fade-in-empty {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>

<h4 class="text-center text-2xl font-semibold mb-6 text-cyan-400 glow">QR Codes of {{ user.username }}</h4>

{% if qrcodes %}
<div class="row g-4">
    {% for qr in qrcodes %}
    <div class="col-md-4 qr-card-container">
        <div class="qr-card card mb-3 shadow position-relative">
            <!-- Holographic overlay -->
            <div class="holo-overlay"></div>
            <!-- Scanning lines -->
            <div class="scan-lines"></div>
            <div class="card-body">
                <p class="qr-data small">{{ qr.data }}</p>
                <img src="/{{ qr.image_path }}" alt="QR Code" class="qr-image img-fluid">
            </div>
        </div>
    </div>
    {% endfor %}
</div>
{% else %}
<p class="empty-state">No QR codes generated by this user.</p>
{% endif %}

<a href="{{ url_for('auth.admin_dashboard') }}" class="neon-btn btn mt-3 px-4 py-2 rounded">
    Back to Dashboard
</a>
{% endblock %}
