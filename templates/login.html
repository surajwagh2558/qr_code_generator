{% extends "base.html" %}
{% block title %}Login{% endblock %}

{% block content %}
<!-- Custom CSS for futuristic styles and 3D animations -->
<style>
  @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap');

  body {
    font-family: 'Poppins', sans-serif;
    background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
    color: #e0e0e0;
    overflow-x: hidden;
  }

  /* Futuristic grid background animation */
  .grid-bg {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-image: 
      linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
    background-size: 50px 50px;
    animation: grid-move 20s linear infinite;
    z-index: -1;
  }

  @keyframes grid-move {
    0% { transform: translate(0, 0); }
    100% { transform: translate(50px, 50px); }
  }

  /* 3D Card with tilt effect */
  .login-card {
    background: linear-gradient(145deg, rgba(0, 20, 40, 0.9), rgba(0, 40, 80, 0.8));
    border: 1px solid rgba(0, 255, 255, 0.3);
    box-shadow: 0 10px 30px rgba(0, 255, 255, 0.2), inset 0 0 20px rgba(0, 255, 255, 0.1);
    transform-style: preserve-3d;
    transition: transform 0.3s ease;
  }

  .login-card:hover {
    transform: perspective(1000px) rotateX(5deg) rotateY(5deg);
  }

  /* Neon glow for inputs and button */
  .neon-input {
    background: rgba(0, 0, 0, 0.5);
    border: 1px solid rgba(0, 255, 255, 0.5);
    color: #e0e0e0;
    transition: all 0.3s ease;
  }

  .neon-input:focus {
    box-shadow: 0 0 10px rgba(0, 255, 255, 0.8), 0 0 20px rgba(0, 255, 255, 0.5);
    transform: scale(1.02);
  }

  .neon-btn {
    background: linear-gradient(45deg, #00ffff, #0080ff);
    border: none;
    color: #000;
    font-weight: 600;
    transition: all 0.3s ease;
    box-shadow: 0 5px 15px rgba(0, 255, 255, 0.3);
  }

  .neon-btn:hover {
    transform: translateY(-2px) scale(1.05);
    box-shadow: 0 10px 25px rgba(0, 255, 255, 0.5);
  }

  /* 3D Rotating QR Icon */
  .qr-icon {
    width: 50px;
    height: 50px;
    background: linear-gradient(45deg, #00ffff, #ff00ff);
    border-radius: 10px;
    position: relative;
    animation: rotate-3d 6s infinite linear;
    box-shadow: 0 5px 15px rgba(0, 255, 255, 0.5);
  }

  .qr-icon::before {
    content: 'QR';
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    font-size: 12px;
    font-weight: bold;
    color: #000;
  }

  @keyframes rotate-3d {
    0% { transform: rotateX(0deg) rotateY(0deg); }
    25% { transform: rotateX(90deg) rotateY(0deg); }
    50% { transform: rotateX(90deg) rotateY(90deg); }
    75% { transform: rotateX(0deg) rotateY(90deg); }
    100% { transform: rotateX(0deg) rotateY(0deg); }
  }

  /* Holographic overlay */
  .holo-overlay {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.1) 50%, transparent 70%);
    pointer-events: none;
    opacity: 0.5;
  }
</style>

<!-- Animated grid background -->
<div class="grid-bg"></div>

<div class="min-h-screen flex items-center justify-center px-4">
  <div class="login-card relative p-8 rounded-lg max-w-md w-full">
    <!-- Holographic overlay for futuristic effect -->
    <div class="holo-overlay"></div>

    <!-- 3D Rotating QR Icon -->
    <div class="flex justify-center mb-6">
      <div class="qr-icon"></div>
    </div>

    <h4 class="text-center text-2xl font-semibold mb-6 text-cyan-400 glow">Login</h4>

    <form method="post" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium mb-2">Email</label>
        <input type="email" id="email" name="email" class="neon-input w-full px-4 py-3 rounded-md placeholder-gray-400" placeholder="Email" required>
      </div>

      <div>
        <label for="password" class="block text-sm font-medium mb-2">Password</label>
        <input type="password" id="password" name="password" class="neon-input w-full px-4 py-3 rounded-md placeholder-gray-400" placeholder="Password" required>
      </div>

      <button type="submit" class="neon-btn w-full py-3 rounded-md font-semibold">Login</button>
    </form>

    <p class="text-center mt-6 text-sm">
      No account? <a href="{{ url_for('auth.register') }}" class="text-cyan-400 hover:text-cyan-300 transition-colors">Register</a>
    </p>
  </div>
</div>
{% endblock %}
