<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}QR Code Generator{% endblock %}</title>

    <!-- Bootstrap 5 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Tailwind CSS for modern utilities -->
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">

    <!-- Google Fonts for futuristic typography -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

    <!-- Custom CSS for futuristic styles and 3D animations -->
    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 50%, #16213e 100%);
            color: #e0e0e0;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }

        /* Futuristic grid background animation */
        .grid-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(0, 255, 255, 0.1) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0, 255, 255, 0.1) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: grid-move 20s linear infinite;
            z-index: -2;
        }

        @keyframes grid-move {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        /* Floating 3D particles for background dynamism */
        .particles {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: -1;
        }

        .particle {
            position: absolute;
            width: 4px;
            height: 4px;
            background: rgba(0, 255, 255, 0.5);
            border-radius: 50%;
            animation: float-3d 10s infinite ease-in-out;
        }

        .particle:nth-child(1) { top: 10%; left: 20%; animation-delay: 0s; }
        .particle:nth-child(2) { top: 30%; left: 70%; animation-delay: 2s; }
        .particle:nth-child(3) { top: 60%; left: 40%; animation-delay: 4s; }
        .particle:nth-child(4) { top: 80%; left: 10%; animation-delay: 6s; }
        .particle:nth-child(5) { top: 50%; left: 90%; animation-delay: 8s; }

        @keyframes float-3d {
            0%, 100% { transform: translateY(0) rotateX(0deg); opacity: 0.5; }
            50% { transform: translateY(-20px) rotateX(180deg); opacity: 1; }
        }

        /* Enhanced Navbar with neon and 3D effects */
        .navbar {
            background: linear-gradient(90deg, rgba(0, 0, 0, 0.9), rgba(0, 20, 40, 0.8));
            border-bottom: 1px solid rgba(0, 255, 255, 0.3);
            box-shadow: 0 0 20px rgba(0, 255, 255, 0.2);
        }

        .navbar-brand {
            color: #00ffff !important;
            font-weight: 600;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
            transition: transform 0.3s ease;
        }

        .navbar-brand:hover {
            transform: perspective(500px) rotateY(10deg);
        }

        .nav-link {
            color: #e0e0e0 !important;
            transition: color 0.3s ease, text-shadow 0.3s ease;
        }

        .nav-link:hover {
            color: #00ffff !important;
            text-shadow: 0 0 10px rgba(0, 255, 255, 0.8);
        }

        /* Container with subtle glow */
        .container {
            background: rgba(0, 0, 0, 0.1);
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 5px 15px rgba(0, 255, 255, 0.1);
            margin-top: 20px;
        }

        /* Flash messages with 3D slide-in animation */
        .alert {
            background: rgba(0, 0, 0, 0.8) !important;
            border: 1px solid rgba(255, 193, 7, 0.5);
            color: #e0e0e0 !important;
            animation: slide-in-3d 0.5s ease-out;
        }

        .alert-success {
            border-color: rgba(0, 255, 0, 0.5);
        }

        .alert-danger {
            border-color: rgba(255, 0, 0, 0.5);
        }

        @keyframes slide-in-3d {
            from {
                opacity: 0;
                transform: translateY(-20px) rotateX(-10deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotateX(0deg);
            }
        }

        /* Holographic overlay for content areas (optional, can be added per page) */
        .holo-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(45deg, transparent 30%, rgba(255, 255, 255, 0.05) 50%, transparent 70%);
            pointer-events: none;
            opacity: 0.3;
            z-index: 1;
        }
    </style>
</head>

<body class="bg-light">
    <!-- Animated grid background -->
    <div class="grid-bg"></div>

    <!-- Floating 3D particles -->
    <div class="particles">
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
    </div>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="{{ url_for('auth.home') }}">QR Generator</a>

            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    {% if current_user.is_authenticated %}
                        <li class="nav-item">
                            <a class="nav-link" href="{{ url_for('auth.logout') }}">Logout</a>
                        </li>
                    {% endif %}
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-4 relative">
        <!-- Optional holographic overlay for content (uncomment if desired) -->
        <!-- <div class="holo-overlay"></div> -->

        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <div class="alert alert-{{ category }} alert-dismissible fade show">
                        {{ message }}
                        <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
                    </div>
                {% endfor %}
            {% endif %}
        {% endwith %}

        {% block content %}{% endblock %}
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
